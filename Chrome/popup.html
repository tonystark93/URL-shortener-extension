<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <script src='jquery-3.2.1.min.js'></script>
    <script src="qrcode.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>URL Shortener</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app">
        <main class="content">
            <label class="field-label" for="inputText">Long URL</label>
            <input id='inputText' type='text' placeholder="https://example.com/page" class="input" />

            <p class='error hide'></p>

            <button id='shortenBtn' class='btn btn-primary'>
                <span id='btnText'>Shorten &amp; Copy</span>
            </button>

            <label class="field-label" for="outputText">Short URL</label>
            <div class="input-wrap">
                <input id='outputText' class="input input-output" placeholder="Your short link will appear here"
                    type='text' readonly />
                <button id="copyBtn" class="copy-btn" type="button" title="Copy short URL">
                    <svg class="icon-copy" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path
                            d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" />
                    </svg>
                    <svg class="icon-check" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" />
                    </svg>
                </button>
            </div>

            <div class='actions'>
                <button id='qrCodeGen' class='btn btn-secondary disabled' disabled>QR Code</button>
                <button id='history' class='btn btn-secondary'>History</button>
                <a class="btn btn-secondary btn-icon" id="options" href="options.html" target="_blank"
                    title="Settings">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="icon-cog">
                        <path
                            d="M6.8 3.45c.87-.52 1.82-.92 2.83-1.17a2.5 2.5 0 0 0 4.74 0c1.01.25 1.96.65 2.82 1.17a2.5 2.5 0 0 0 3.36 3.36c.52.86.92 1.8 1.17 2.82a2.5 2.5 0 0 0 0 4.74c-.25 1.01-.65 1.96-1.17 2.82a2.5 2.5 0 0 0-3.36 3.36c-.86.52-1.8.92-2.82 1.17a2.5 2.5 0 0 0-4.74 0c-1.01-.25-1.96-.65-2.82-1.17a2.5 2.5 0 0 0-3.36-3.36 9.94 9.94 0 0 1-1.17-2.82 2.5 2.5 0 0 0 0-4.74c.25-1.01.65-1.96 1.17-2.82a2.5 2.5 0 0 0 3.36-3.36zM12 16a4 4 0 1 0 0-8 4 4 0 0 0 0 8z" />
                        <circle cx="12" cy="12" r="2" />
                    </svg>
                </a>
            </div>

            <div id="qrcode" class="qrcode"></div>

            <div class='footer'>
                <span class="rate-label">Enjoying it? Rate us</span>
                <a class="rate-link"
                    href="https://chromewebstore.google.com/detail/url-shortener/godoifjoiadanijplaghmhgfeffnblib/reviews"
                    target="_blank" title="Leave a review">
                    <div class="rating">
                        <span></span><span></span><span></span><span></span><span></span>
                    </div>
                </a>
            </div>
        </main>
    </div>
</body>

<script src='popup.js' type="text/javascript"></script>
<style>
    :root {
        --bg: #f8fafc;
        --surface: #ffffff;
        --border: #e2e8f0;
        --border-strong: #cbd5e1;
        --text: #0f172a;
        --muted: #64748b;
        --accent: #2563eb;
        --accent-hover: #1d4ed8;
        --accent-soft: #eff6ff;
        --danger: #dc2626;
        --shadow: 0 1px 2px rgba(15, 23, 42, 0.06), 0 1px 3px rgba(15, 23, 42, 0.04);
    }

    * {
        box-sizing: border-box;
    }

    body {
        width: 360px;
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 14px;
        color: var(--text);
        background-color: var(--bg);
    }

    .app {
        padding: 0;
    }

    .icon-cog {
        width: 19px;
        height: 19px;
        fill: currentColor;
    }

    .content {
        padding: 16px;
        display: flex;
        flex-direction: column;
    }

    .field-label {
        font-size: 12px;
        font-weight: 500;
        color: var(--muted);
        margin-bottom: 6px;
    }

    .input {
        width: 100%;
        height: 40px;
        padding: 0 12px;
        font-size: 14px;
        font-family: inherit;
        color: var(--text);
        background: var(--surface);
        border: 1px solid var(--border-strong);
        border-radius: 8px;
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input::placeholder {
        color: #94a3b8;
    }

    .input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .input-output {
        background: var(--bg);
        font-weight: 500;
        color: var(--accent);
        padding-right: 42px;
    }

    .input-wrap {
        position: relative;
    }

    .copy-btn {
        position: absolute;
        top: 50%;
        right: 6px;
        transform: translateY(-50%);
        width: 30px;
        height: 30px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: none;
        border-radius: 6px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
    }

    .copy-btn:hover {
        background: var(--border);
        color: var(--accent);
    }

    .copy-btn svg {
        width: 16px;
        height: 16px;
        fill: currentColor;
    }

    .copy-btn .icon-check {
        display: none;
    }

    .copy-btn.copied {
        color: #16a34a;
    }

    .copy-btn.copied .icon-copy {
        display: none;
    }

    .copy-btn.copied .icon-check {
        display: inline;
    }

    .btn {
        height: 40px;
        padding: 0 14px;
        font-size: 14px;
        font-weight: 500;
        font-family: inherit;
        border-radius: 8px;
        border: 1px solid transparent;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .btn-primary {
        width: 100%;
        margin: 14px 0;
        background: var(--accent);
        color: #fff;
    }

    .btn-primary:hover {
        background: var(--accent-hover);
    }

    .btn-secondary {
        flex: 1;
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border-strong);
    }

    .btn-secondary:hover {
        background: var(--bg);
        border-color: var(--muted);
    }

    .actions {
        display: flex;
        gap: 10px;
        margin-top: 14px;
    }

    .btn-icon {
        flex: none;
        width: 40px;
        padding: 0;
        color: var(--muted);
    }

    .btn-icon:hover {
        color: var(--text);
    }

    .disabled,
    .btn:disabled {
        color: #94a3b8;
        background: var(--bg);
        border-color: var(--border);
        cursor: not-allowed;
    }

    .disabled:hover,
    .btn:disabled:hover {
        background: var(--bg);
        border-color: var(--border);
    }

    .error {
        margin: 7px 0px;
        padding: 9px 11px;
        font-size: 13px;
        color: var(--danger);
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 8px;
        line-height: 1.4;
    }

    .error a {
        color: var(--danger);
        font-weight: 500;
    }

    .hide {
        display: none;
    }

    .qrcode {
        text-align: center;
    }

    .qrcode img {
        display: inline-block !important;
        margin-top: 16px;
        padding: 10px;
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 10px;
    }

    .footer {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 18px;
        padding-top: 14px;
        border-top: 1px solid var(--border);
    }

    .rate-label {
        font-size: 12px;
        color: var(--muted);
    }

    .rate-link {
        display: inline-flex;
        text-decoration: none;
    }

    .rating {
        unicode-bidi: bidi-override;
        direction: rtl;
        display: inline-flex;
    }

    .rating>span {
        position: relative;
        width: 1.05em;
        font-size: 16px;
        color: #cbd5e1;
        cursor: pointer;
        transition: color 0.1s;
    }

    .rating span:before {
        content: "\2605";
    }

    .rating span:hover:before,
    .rating span:hover~span:before {
        color: #f59e0b;
        content: "\2605";
    }

    .rating span:hover,
    .rating span:hover~span {
        color: #f59e0b;
    }

    .loader {
        width: 18px;
        height: 18px;
        filter: brightness(0) invert(1);
    }

    /* ---------- Dark mode ---------- */
    .nightMode {
        --bg: #0f172a;
        --surface: #1e293b;
        --border: #334155;
        --border-strong: #475569;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #3b82f6;
        --accent-hover: #60a5fa;
        --accent-soft: #1e293b;
        --danger: #f87171;
    }

    .nightMode .input-output {
        color: #60a5fa;
    }

    .nightMode .error {
        background: #2a1414;
        border-color: #5b2121;
    }

    .nightMode .qrcode img {
        background: #fff;
    }
</style>

</html>
