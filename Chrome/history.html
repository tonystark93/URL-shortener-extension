<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>URL Shortener — History</title>
    <meta content="" name="description">
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <style>
        :root {
            --bg: #f1f5f9;
            --surface: #ffffff;
            --border: #e2e8f0;
            --border-strong: #cbd5e1;
            --text: #0f172a;
            --muted: #64748b;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --accent-soft: #eff6ff;
            --danger: #dc2626;
            --danger-hover: #b91c1c;
            --shadow: 0 1px 2px rgba(15, 23, 42, 0.06), 0 1px 3px rgba(15, 23, 42, 0.04);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            padding: 32px 20px 64px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 14px;
            color: var(--text);
            background: var(--bg);
        }

        .page {
            max-width: 1040px;
            margin: 0 auto;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
        }

        .brand-name {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .brand-sub {
            margin: 2px 0 0;
            font-size: 13px;
            color: var(--muted);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .table {
            display: table;
            width: 100%;
            border-collapse: collapse;
        }

        .row {
            display: table-row;
        }

        .row.header {
            background: var(--bg);
        }

        .cell {
            display: table-cell;
            padding: 14px 20px;
            font-size: 14px;
            color: var(--text);
            line-height: 1.5;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
            word-break: break-all;
        }

        .row:last-child .cell {
            border-bottom: none;
        }

        .row.header .cell {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .row .cell:nth-child(1) {
            width: 44%;
        }

        .row .cell:nth-child(2) {
            width: 28%;
            color: var(--accent);
            font-weight: 500;
        }

        .row.header .cell:nth-child(2) {
            color: var(--muted);
            font-weight: 600;
        }

        .row .cell:nth-child(3) {
            width: 28%;
        }

        .row:not(.header):hover {
            background: var(--accent-soft);
        }

        .cell a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.15s;
        }

        .cell a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        #noc .cell {
            color: var(--muted);
            font-style: normal;
        }

        /* ---------- Buttons ---------- */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            height: 38px;
            padding: 0 16px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            border: 1px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border-strong);
        }

        .btn-secondary:hover {
            background: var(--bg);
            border-color: var(--muted);
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
        }

        .btn-danger:hover {
            background: var(--danger-hover);
        }

        /* ---------- Dark mode ---------- */
        .nightMode {
            --bg: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --border-strong: #475569;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --accent-soft: #1e293b;
            --danger: #ef4444;
            --danger-hover: #dc2626;
        }
    </style>

    <div class="page">
        <header class="page-header">
            <div class="brand">
                <img src="icon48.png" class="brand-icon" alt="">
                <div>
                    <h1 class="brand-name">History</h1>
                    <p class="brand-sub">Your shortened links</p>
                </div>
            </div>
            <div class="header-actions">
                <button class='btn btn-secondary' id='importCSV'>Export CSV</button>
                <button class='btn btn-danger' id='deleteHistory'>Delete history</button>
            </div>
        </header>

        <div class="card">
            <div class="table" id="table">
                <div class="row header">
                    <div class="cell">Original URL</div>
                    <div class="cell">Short URL</div>
                    <div class="cell">Analytics</div>
                </div>
                <div class='row' id="noc">
                    <div class='cell'>No data available</div>
                    <div class='cell'>No data available</div>
                    <div class='cell'>No data available</div>
                </div>
            </div>
        </div>
    </div>

    <script src="history.js" type="text/javascript"></script>
</body>

</html>
